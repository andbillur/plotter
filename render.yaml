# Render.com deploy
services:
  - type: web
    name: plotter-crm-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: plotter-crm-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      # Ochiq Power BI embed o'chiq (sir). Faqat ALLOW_POWERBI_PUBLIC_EMBED=true bo'lsa yoqiladi.
      - key: ALLOW_POWERBI_PUBLIC_EMBED
        value: "false"

  - type: web
    name: plotter-crm-web
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false

databases:
  - name: plotter-crm-db
    plan: free
    databaseName: plotter_crm
    user: plotter
